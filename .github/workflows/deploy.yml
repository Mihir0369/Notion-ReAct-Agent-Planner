name: Deploy to AWS EC2

on:
    push:
        branches: ["main"]
        
env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Log in to the Container registry
              uses: docker/login-action@v3
              with:
                registry: ${{ env.REGISTRY }}
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract  metadata (tags, labels) for Docker
              id: meta
              uses: docker/metadata-action@v5
              with:
                images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            
            - name: Build and push Docker image
              uses: docker/build-push-action@v5
              with:
                context: .
                push: true
                tags: ${{ steps.meta.outputs.tags }}
                labels: ${{ steps.meta.outputs.labels }}
            
              
    deploy:
        runs-on: ubuntu-latest
        needs: build-and-push
        steps:
            - name: Deploy to AWS EC2
              uses: appleboy/ssh-action@v1.1.0
              with:
                host: ${{ secrets.HOST }}
                username: ${{ secrets.USERNAME }}
                key: ${{ secrets.SSH_KEY }}

                script: |
                    echo "${{secrets.CR_PAT}}" | docker login ghcr.io -u ${{ secrets.USERNAME}} --password-stdin 

                    docker stop react-agent-planner || true
                    docker rm react-agent-planner || true

                    RAW_TAG="ghcr.io/${{ github.repository}}:main"
                    IMAGE_TAG=$(echo "$RAW_TAG" | tr '[:upper:]' '[:lower:]')
                    docker pull $IMAGE_TAG

                    docker run -d \\
                      --name react-agent-planner \\
                      -p 8000:8000 \\
                      --restart unless-stopped \\
                      -e GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \\
                      -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \\
                      -e NOTION_API_KEY="${{ secrets.NOTION_API_KEY }}" \\
                      -e NOTION_CALENDAR_DB_ID="${{ secrets.NOTION_CALENDAR_DB_ID }}" \\
                      -e NOTION_NOTES_DB_ID="${{ secrets.NOTION_NOTES_DB_ID }}" \\
                      $IMAGE_TAG